# This configuration is intended for development purpose, it's **your** responsibility to harden it for production
name: fitrx
services:
  app:
    image: fitrx
    environment:
      - _JAVA_OPTIONS=-Xmx512m -Xms256m
      - SPRING_PROFILES_ACTIVE=prod,api-docs
      - MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED=true
      - SPRING_SECURITY_REMEMBER_ME_KEY=f91c648fcaf5c2a0208f438e647819a4983cd0f47ee64cdbdc7b6b7924297ddea5a8ce02a1ccf9b65471c8a23d567548fb69
      - SPRING_R2DBC_URL=r2dbc:postgresql://postgresql:5432/FitRx
      - SPRING_R2DBC_USERNAME=FitRx
      - SPRING_R2DBC_PASSWORD=
      - SPRING_LIQUIBASE_URL=jdbc:postgresql://postgresql:5432/FitRx
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS=kafka:9092
    ports:
      - 127.0.0.1:8080:8080
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8080/management/health
      interval: 5s
      timeout: 5s
      retries: 40
    depends_on:
      postgresql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
  postgresql:
    extends:
      file: ./postgresql.yml
      service: postgresql
  elasticsearch:
    extends:
      file: ./elasticsearch.yml
      service: elasticsearch
  kafka:
    extends:
      file: ./kafka.yml
      service: kafka
